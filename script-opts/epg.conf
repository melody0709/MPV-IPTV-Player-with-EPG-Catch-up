# EPG 下载连接配置
# 当此参数存在时，优先使用该连接下载 EPG，而不是 M3U 表头中的 x-tvg-url
# 留空则使用 M3U 文件中的 x-tvg-url
# 使用配置的 EPG 下载连接: http://your-epg-source.com/epg.xml,注意=号后不能有空格
# http://10.10.10.187:6789/t.xml http://10.10.10.189/IPTV/gemini/t.xml

epg_download_url=http://10.10.10.189/IPTV/gemini/t.xml

# 远程 M3U 订阅地址
# 当 mpv 空载启动且此参数非空时，脚本会优先尝试本地缓存的订阅文件，随后按与 EPG 相同的缓存周期在后台刷新
# 双击本地 .m3u/.m3u8 时，仍然优先按本地文件处理，不会被订阅模式覆盖
m3u_download_url=http://10.10.10.189/IPTV/gemini/tv.m3u

# EPG 缓存刷新时间配置
# 从每天 00:07 开始，按 7 小时间隔生成当天刷新点：00:07 / 07:07 / 14:07 / 21:07
# 修改后无需改脚本；若配置无效，脚本会自动回退到旧的固定时段规则
epg_cache_refresh_start=00:07
epg_cache_refresh_interval_hours=7

# 回看续播预加载阈值（秒）
# 当当前回看片段距离结束还剩这么多秒时，提前排队下一段 URL
catchup_preload_seconds=10

# IPTV 四级菜单 UI 配置
# 说明：
# - 0 表示沿用 uosc.conf 中的全局设置
# - 大于 0 表示使用此值（单位：像素）

# 二级/三级/四级菜单副标题字体大小（频道当前节目、日期桶/EPG 日期时间）
# 默认 0=跟随 uosc 自动计算，建议范围 10~24
menu_subtitle_font_size=18

# 四级菜单最小宽度（一级=分组，二级=频道，三级=日期桶，四级=EPG节目）
menu_level1_min_width=130
menu_level2_min_width=260
menu_level3_min_width=100
menu_level4_min_width=0