# uosc + mpv 快捷键配置文件
# 语法: 快捷键  命令  #! 菜单名称
# 使用 #! 注释的项目会显示在 uosc 右键菜单中
# > 用于创建子菜单

# ============================================
# 基础控制
# ============================================

# 播放控制

q           multiply speed 1/1.1                   #! 播放 > 减速
e           multiply speed 1.1                     #! 播放 > 加速
w          set speed 1.0                          #! 播放 > 重置速度


